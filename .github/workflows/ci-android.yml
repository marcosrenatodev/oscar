name: CI Android

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ARTIFACT_NAME: oscar-app-debug-apk
  APK_FILE_NAME: oscar-app-debug.apk
  APK_OUTPUT_DIR: build/outputs
  APK_SOURCE_PATH: oscar_app/app/build/outputs/apk/debug/app-debug.apk

jobs:
  build-apk:
    name: Testar e gerar APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: oscar_app
    steps:
      - name: Checkout do código
        uses: actions/checkout@v6

      - name: Configurar JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup do Gradle (com cache)
        uses: gradle/actions/setup-gradle@v6

      - name: Permissão de execução no gradlew
        run: chmod +x ./gradlew

      - name: Testar e compilar APK de debug
        run: ./gradlew testDebugUnitTest assembleDebug --stacktrace

      - name: Preparar APK
        working-directory: .
        run: |
          mkdir -p "${APK_OUTPUT_DIR}"
          cp "${APK_SOURCE_PATH}" "${APK_OUTPUT_DIR}/${APK_FILE_NAME}"

      - name: Upload do APK como artefato
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.APK_OUTPUT_DIR }}/${{ env.APK_FILE_NAME }}
          if-no-files-found: error

  release:
    name: Publicar GitHub Release
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
    needs: build-apk
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Baixar APK do artefato
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ./apk

      - name: Criar GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "android-v${{ github.run_number }}" \
            "./apk/${APK_FILE_NAME}" \
            --title "Oscar App Android v${{ github.run_number }}" \
            --notes "APK de debug gerado automaticamente pelo workflow run #${{ github.run_number }} (commit ${{ github.sha }})." \
            --repo "${{ github.repository }}"
